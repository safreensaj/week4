<body>
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debounced Post Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }

    #results {
      margin-top: 20px;
    }

    .post {
      padding: 8px;
      border-bottom: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <h2>Search Posts</h2>

  <input type="text" id="searchInput" placeholder="Type to search posts..." />
  <button id="searchBtn">Search</button>

  <div id="results"></div>

  <script>
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const results = document.getElementById("results");

    async function fetchPosts(searchText) {
      if (searchText.trim() === "") {
        results.innerHTML = "";
        return;
      }

      const response = await fetch(
        `https://jsonplaceholder.typicode.com/posts?title_like=${searchText}`
      );

      const data = await response.json();

      results.innerHTML = "";

      if (data.length === 0) {
        results.innerHTML = "<p>No results found</p>";
        return;
      }

      data.forEach((post) => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerText = post.title;
        results.appendChild(div);
      });
    }

    function debounce(fn, delay) {
      let timer;

      return function (...args) {
        clearTimeout(timer);

        timer = setTimeout(() => {
          fn(...args);
        }, delay);
      };
    }

    const debouncedSearch = debounce(function () {
      fetchPosts(searchInput.value);
    }, 500);

    searchInput.addEventListener("input", debouncedSearch);

    searchBtn.addEventListener("click", function () {
      fetchPosts(searchInput.value);
    });
  </script>

</body>
</html>
</body>
</html>
