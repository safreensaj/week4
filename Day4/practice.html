<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="searchbox">
    <script>
        const input=document.getElementById("searchbox");
        function bounce(fn,delay){
          let timer;

          return function(...args){
            clearTimeout(timer);
           timer=setTimeout(()=>{
            fn(...args)
           },delay)
          }
        }

        function handlefunction(e){
           console.log("Typing stopped:",e.target.value) 
        }
let searchbounce=bounce(handlefunction,2000)
        input.addEventListener("input",searchbounce)
    </script>
</body>
</html>
